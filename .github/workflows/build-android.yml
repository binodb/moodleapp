name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Prepare Android platform
        run: |
          npx ionic cordova platform add android@14.0.1 --no-interactive || true
          npx ionic cordova prepare android --no-interactive

      - name: Build release APK
        run: npx ionic cordova build android --release --no-interactive -- --packageType=apk

      - name: Locate generated APKs
        run: |
          echo "Searching for APK files after build..."
          find . -type f -name "*.apk" | sort || true

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          [ -n "$ANDROID_KEYSTORE_BASE64" ] || (echo "Missing secret: ANDROID_KEYSTORE_BASE64" && exit 1)
          [ -n "$ANDROID_KEYSTORE_PASSWORD" ] || (echo "Missing secret: ANDROID_KEYSTORE_PASSWORD" && exit 1)
          [ -n "$ANDROID_KEY_ALIAS" ] || (echo "Missing secret: ANDROID_KEY_ALIAS" && exit 1)
          [ -n "$ANDROID_KEY_PASSWORD" ] || (echo "Missing secret: ANDROID_KEY_PASSWORD" && exit 1)

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > iincertfi-release.jks

      - name: Align and sign APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          APK_CANDIDATE="$(find platforms/android/app/build/outputs/apk/release -type f -name '*-unsigned.apk' 2>/dev/null | head -n 1)"
          if [ -z "$APK_CANDIDATE" ]; then
            APK_CANDIDATE="$(find . -type f -name '*-unsigned.apk' | head -n 1)"
          fi
          if [ -z "$APK_CANDIDATE" ]; then
            APK_CANDIDATE="$(find platforms/android/app/build/outputs/apk/release -type f -name '*.apk' 2>/dev/null | head -n 1)"
          fi
          if [ -z "$APK_CANDIDATE" ]; then
            APK_CANDIDATE="$(find . -type f -name '*release*.apk' | head -n 1)"
          fi
          if [ -z "$APK_CANDIDATE" ]; then
            echo "Release APK not found. Dumping APK candidates:"
            find . -type f -name "*.apk" | sort || true
            exit 1
          fi

          BUILD_TOOLS_DIR="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)"
          "$BUILD_TOOLS_DIR/zipalign" -p -f 4 "$APK_CANDIDATE" IINCertFi-release-aligned.apk

          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks iincertfi-release.jks \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass pass:"$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass pass:"$ANDROID_KEY_PASSWORD" \
            --out IINCertFi-release.apk \
            IINCertFi-release-aligned.apk

          "$BUILD_TOOLS_DIR/apksigner" verify IINCertFi-release.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: IINCertFi-release-apk
          path: IINCertFi-release.apk
