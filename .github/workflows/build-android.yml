name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  NODE_OPTIONS: "--max-old-space-size=8192"
  ANDROID_SDK_VERSION: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        run: |
          echo "Accepting Android SDK licenses..."
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          echo "Installing Android SDK platform $ANDROID_SDK_VERSION and build-tools $ANDROID_BUILD_TOOLS..."
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-$ANDROID_SDK_VERSION" \
            "build-tools;$ANDROID_BUILD_TOOLS" \
            "platform-tools"
          echo "Installed SDK packages:"
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --list_installed 2>/dev/null || \
            "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --list 2>/dev/null | head -40

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('config.xml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Prepare Android platform
        run: |
          npx ionic cordova platform add android@14.0.1 --no-interactive || true
          npx ionic cordova prepare android --no-interactive

      - name: Build release APK
        run: |
          npx ionic cordova build android --release --no-interactive -- \
            --packageType=apk \
            --gradleArg=-PcdvBuildMultipleApks=false

      - name: Locate generated APKs
        if: always()
        run: |
          echo "=== APK files ==="
          find . -type f -name "*.apk" 2>/dev/null | sort || echo "No APK found"
          echo "=== AAB files ==="
          find . -type f -name "*.aab" 2>/dev/null | sort || echo "No AAB found"
          echo "=== Build output directory ==="
          ls -laR platforms/android/app/build/outputs/ 2>/dev/null || echo "Build outputs dir not found"

      - name: Validate signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          [ -n "$ANDROID_KEYSTORE_BASE64" ] || { echo "::error::Missing secret: ANDROID_KEYSTORE_BASE64"; exit 1; }
          [ -n "$ANDROID_KEYSTORE_PASSWORD" ] || { echo "::error::Missing secret: ANDROID_KEYSTORE_PASSWORD"; exit 1; }
          [ -n "$ANDROID_KEY_ALIAS" ] || { echo "::error::Missing secret: ANDROID_KEY_ALIAS"; exit 1; }
          [ -n "$ANDROID_KEY_PASSWORD" ] || { echo "::error::Missing secret: ANDROID_KEY_PASSWORD"; exit 1; }
          echo "All signing secrets are present."

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" \
            | tr '_-' '/+' \
            | tr -d '\r\n\t ' \
            | base64 --decode > iincertfi-release.jks
          echo "Keystore file size: $(stat --format=%s iincertfi-release.jks) bytes"

      - name: Validate decoded keystore
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -e
          KS_PASS="$(printf '%s' "$ANDROID_KEYSTORE_PASSWORD" | tr -d '\r\n')"
          [ -s iincertfi-release.jks ] || { echo "::error::Decoded keystore is empty."; exit 1; }
          keytool -list -keystore iincertfi-release.jks -storepass "$KS_PASS"

      - name: Align and sign APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          KS_PASS="$(printf '%s' "$ANDROID_KEYSTORE_PASSWORD" | tr -d '\r\n')"
          KEY_PASS="$(printf '%s' "$ANDROID_KEY_PASSWORD" | tr -d '\r\n')"
          KEY_ALIAS="$(printf '%s' "$ANDROID_KEY_ALIAS" | tr -d '\r\n')"

          # Find the unsigned APK
          APK_CANDIDATE=""
          for pattern in \
            "platforms/android/app/build/outputs/apk/release/*-unsigned.apk" \
            "platforms/android/app/build/outputs/apk/release/*.apk" \
            ; do
            APK_CANDIDATE="$(find . -path "./$pattern" 2>/dev/null | head -n 1)"
            [ -n "$APK_CANDIDATE" ] && break
          done

          # Broader fallback search
          if [ -z "$APK_CANDIDATE" ]; then
            APK_CANDIDATE="$(find . -type f -name '*-unsigned.apk' ! -path './node_modules/*' | head -n 1)"
          fi
          if [ -z "$APK_CANDIDATE" ]; then
            APK_CANDIDATE="$(find . -type f -name '*.apk' ! -path './node_modules/*' | head -n 1)"
          fi

          if [ -z "$APK_CANDIDATE" ]; then
            echo "::error::Release APK not found after build."
            echo "APK candidates:"
            find . -type f -name "*.apk" ! -path './node_modules/*' | sort || true
            echo "AAB candidates:"
            find . -type f -name "*.aab" ! -path './node_modules/*' | sort || true
            exit 1
          fi

          echo "Found APK: $APK_CANDIDATE"

          BUILD_TOOLS_DIR="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)"
          "$BUILD_TOOLS_DIR/zipalign" -p -f 4 "$APK_CANDIDATE" IINCertFi-release-aligned.apk

          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks iincertfi-release.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$KS_PASS" \
            --key-pass pass:"$KEY_PASS" \
            --out IINCertFi-release.apk \
            IINCertFi-release-aligned.apk

          "$BUILD_TOOLS_DIR/apksigner" verify IINCertFi-release.apk
          echo "APK signed and verified successfully!"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: IINCertFi-release-apk
          path: IINCertFi-release.apk
